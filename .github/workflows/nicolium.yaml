name: Nicolium CI

on:
  push:
    branches: [ "develop", "semistable" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Test and upload artifacts
    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - name: Install system dependencies
      run: sudo apt install -y unzip

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Install deps
      working-directory: .
      run: pnpm install

    - name: Build pl-api
      env:
        NODE_ENV: production
      working-directory: ./packages/pl-api
      run: pnpm build

    - name: Lint
      working-directory: ./packages/nicolium
      run: pnpm lint

    - name: Build
      env:
        NODE_ENV: production
      working-directory: ./packages/nicolium
      run: pnpm build

    - name: i18n
      working-directory: ./packages/nicolium
      run: |
          pnpm i18n
          git diff
          git diff --quiet || (echo "Locale files are out of date. Please run \`pnpm i18n\`" && exit 1)

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: pl-fe
        path: packages/nicolium/dist

    - name: Include archive
      working-directory: ./packages/nicolium/dist
      run: zip -r ../nicolium.zip .

    - name: Upload release zip artifact
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v4
      with:
        name: nicolium-release-zip
        path: packages/nicolium/nicolium.zip

    - name: build
      if: ${{ !startsWith(github.ref, 'refs/tags/') }}
      env:
        NODE_ENV: production
      working-directory: ./packages/nicolium
      run: |
          BANNER_HTML="pl.mkljczk.pl runs Nicolium's \`develop\` branch, which can break sometimes. For a more stable experience, use <a href=\"https://web.nicolium.app\" target=\"_blank\" rel=\"noopener noreferrer\">web.nicolium.app</a>." WITH_LANDING_PAGE=true ANALYZE=true pnpm build
          cp dist/index.html dist/404.html
          cp nicolium.zip dist/pl-fe.zip

    - name: Build pl-api documentation
      if: ${{ !startsWith(github.ref, 'refs/tags/') }}
      working-directory: ./packages/pl-api
      run: npx typedoc

    - name: Copy pl-api documentation
      if: ${{ !startsWith(github.ref, 'refs/tags/') }}
      working-directory: ./packages/pl-api
      run: cp docs ../nicolium/dist/pl-api-docs -r

    - name: Create docs redirect
      if: ${{ !startsWith(github.ref, 'refs/tags/') }}
      working-directory: .
      run: |
        mkdir -p ./packages/nicolium/dist/docs
        cat > ./packages/nicolium/dist/docs/index.html << 'EOF'
        <!doctype html>
        <html lang="en"><head><meta http-equiv="refresh" content="0; url=https://nicolium.app/docs" /><title>Redirecting…</title><script>window.location.replace('https://nicolium.app/docs');</script></head><body><p>Redirecting to <a href="https://nicolium.app/docs">https://nicolium.app/docs</a>…</p></body></html>
        EOF

    - name: Upload Github Pages artifact
      if: ${{ !startsWith(github.ref, 'refs/tags/') }}
      uses: actions/upload-pages-artifact@v3
      with:
        name: github-pages
        path: packages/nicolium/dist

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release zip artifact
        uses: actions/download-artifact@v4
        with:
          name: nicolium-release-zip
          path: .

      - name: Upload asset to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nicolium.zip
          generate_release_notes: true

  deploy:
    needs: build
    if: github.ref == 'refs/heads/develop'

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

