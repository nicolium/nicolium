name: Update en.json and commit
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: i18n
      working-directory: ./packages/nicolium
      run: pnpm i18n

    - name: Commit and push readme changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "nicolium: update en.json"
        branch: develop
        file_pattern: packages/nicolium/src/locales/en.json